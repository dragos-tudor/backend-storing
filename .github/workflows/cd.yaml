name: CD (publish to GitHub nuget packages)

on:
  workflow_dispatch:
    inputs:
      version:
        description: package version to publish
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    runs-on: self-hosted

    steps:
      # dev container self hosted GitHub agent!
      # - name: Checkout
      #   uses: actions/checkout@v4

      # - name: Setup .NET
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: |
      #       10.0.x

      - name: Determine version
        id: version
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Permissions
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          chmod u+x -R ./.scripts/*.sh

      - name: Pack packages
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p ./.packages
          for project in \
            Storing.MongoDb/Storing.MongoDb.csproj \
            Storing.Redis/Storing.Redis.csproj \
            Storing.SqlServer/Storing.SqlServer.csproj
          do
            [ -e "$project" ] || continue
            ./.scripts/packing.sh "$project" "${{ steps.version.outputs.version }}"
          done

      - name: Publish to GitHub Packages
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          for package in ./.packages/*.nupkg; do
            [ -e "$package" ] || continue
            ./.scripts/publishing.sh "$package" "${{ secrets.GITHUB_TOKEN }}" "${{ github.repository_owner }}"
          done