name: CD (publish to GitHub nuget packages)

on:
  workflow_dispatch:
    inputs:
      version:
        description: package version to publish
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    runs-on: self-hosted

    steps:
      # dev container self hosted GitHub agent!
      # - name: Checkout
      #   uses: actions/checkout@v4

      # - name: Setup .NET
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: |
      #       10.0.x

      - name: Determine workspace
        id: workspace
        shell: bash
        run: |
          echo "path=/workspaces/backend-storing" >> "$GITHUB_OUTPUT"

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Permissions
        shell: bash
        run: |
          cd "${{ steps.workspace.outputs.path }}"
          chmod u+x -R ./.scripts/*.sh

      - name: Pack packages
        shell: bash
        run: |
          cd "${{ steps.workspace.outputs.path }}"
          mkdir -p ./.packages
          ./.scripts/packing.all.sh "${{ steps.version.outputs.version }}"

      - name: Publish to GitHub Packages
        shell: bash
        run: |
          cd "${{ steps.workspace.outputs.path }}"
          for package in ./.packages/*.nupkg; do
            ./.scripts/publishing.sh "$package" "${{ secrets.GITHUB_TOKEN }}" "${{ github.repository_owner }}"
          done