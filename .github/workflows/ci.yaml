name: CI (build and test nuget packages)

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      # dev container self hosted GitHub agent!
      # - name: Checkout
      #   uses: actions/checkout@v4

      # - name: Setup .NET
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: |
      #       10.0.x

      - name: Permissions
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          chmod u+x -R ./.scripts/*.sh

      - name: Restore
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          ./.scripts/restoring.sh

      - name: Build
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          ./.scripts/building.sh Release

      - name: Test
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          ./.scripts/testing.sh Release